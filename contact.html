<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sotiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="contact-body">

  <nav class="navbar">
    <a href="index.html#top" class="logo">SOTIRO</a>

    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="resume.pdf" target="_blank">Resume</a></li>    </ul>
  </nav>

  <section class="contact-page">
    <div class="contact-shell fade-section">



<div class="contact-left">
  <h1>Contact</h1>

<div class="contact-links-minimal">
  <a href="mailto:youremail@example.com">Email</a>
  <a href="https://github.com/soti0015" target="_blank">GitHub</a>
  <a href="https://linkedin.com/in/your-linkedin" target="_blank">LinkedIn</a>
  <a href="aaron-sotiro-resume.pdf" target="_blank">Resume</a>
</div>
</div>

      <div class="contact-right">
        <form class="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="Your email">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="Your phone number">
            </div>

            <div class="form-group">
              <label for="company">Company</label>
              <input type="text" id="company" name="company" placeholder="Company / Organisation">
            </div>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Write your message here"></textarea>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
<body class="contact-body">

</html>
