<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Sotiro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="contact-body">
    <div id="starfield"></div>

    <nav class="navbar">
      <a href="index.html#top" class="logo">SOTIRO</a>

      <button class="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#projects">Work</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <section class="contact-page">
      <div class="contact-shell fade-section">
        <div class="contact-left">
          <h1>Contact</h1>

          <div class="contact-links-minimal">
            <a href="mailto:aaronsot616@gmail.com">Email</a>
            <a href="https://github.com/Sotiro1" target="_blank">GitHub</a>
            <a
              href="https://www.linkedin.com/in/aaron-sotiro-1695a0379"
              target="_blank"
              >LinkedIn</a
            >
          </div>
        </div>

        <div class="contact-right">
          <form
            id="contact-form"
            class="contact-form"
            action="https://formspree.io/f/xgonnggn"
            method="POST"
          >
            <input
              type="hidden"
              name="_subject"
              value="New portfolio contact form submission"
            />
            <input type="text" name="_gotcha" style="display: none" />

            <div class="form-row">
              <div class="form-group">
                <label for="name">Name</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Your name"
                  required
                />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Your email"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="phone">Phone</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="Your phone number"
                />
              </div>

              <div class="form-group">
                <label for="company">Company</label>
                <input
                  type="text"
                  id="company"
                  name="company"
                  placeholder="Company / Organisation"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                placeholder="Write your message here"
                required
              ></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
          </form>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
